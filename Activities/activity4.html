<!DOCTYPE html>
<html>
    <head>
        <title>Activity4</title>
    </head>
    <body>
        <h2>User Information Form</h2>
        <form action="" method="post">
            <label for="fname">First name:</label><br>
            <input type="text" placeholder="Enter your First Name" id="fname" name="fname" required><br><br>

            <label for="lname">Last name:</label><br>
            <input type="text" placeholder="Enter your Last Name" id="lname" name="lname" required><br><br>

            <label for="age">Age:</label><br>
            <input type="number" placeholder="Enter your Age" id="age" name="age" required><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label><br><br>

            <label>Hobbies:</label><br>
            <input type="checkbox" id="hobby1" name="hobby" value="reading">
            <label for="hobby1">Reading</label><br>
            <input type="checkbox" id="hobby2" name="hobby" value="travelling">
            <label for="hobby1">Travelling</label><br>
            <input type="checkbox" id="hobby3" name="hobby" value="gaming">
            <label for="hobby1">Gaming</label><br>
            <input type="checkbox" id="hobby4" name="hobby" value="cooking">
            <label for="hobby1">Cooking</label><br>
            <input type="checkbox" id="hobby5" name="hobby" value="sports">
            <label for="hobby1">Sports</label><br><br>

            <label for="year-level">Year Level:</label><br>
            <select id="year-level" name="year-level">
                <option value="1st-year">1st Year</option>
                <option value="2nd-year">2nd Year</option>
                <option value="3rd-year">3rd Year</option>
                <option value="4th-year">4th Year</option>
            </select><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>

    </body>
</html>
