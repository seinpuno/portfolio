<!DOCTYPE html>
<html>
<head>
    <title>Products - The Grand Rock Boutique</title>
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <div class="products-grid">
        <div class="product-card">
            <img src="images/stick.png" alt="Stick">
            <p>Stick</p>
            <p class="price">₱50,000</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>

        <div class="product-card">
            <img src="images/grass.png" alt="Grass">
            <p>Grass</p>
            <p class="price">₱125,000</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>

        <div class="product-card">
            <img src="images/stone.png" alt="Stone">
            <p>Stone</p>
            <p class="price">₱600,000</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>

        <div class="product-card">
            <img src="images/dirt.png" alt="Dirt">
            <p>Dirt</p>
            <p class="price">₱38,888</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>

        <div class="product-card">
            <img src="images/mountain.png" alt="Mountain">
            <p>Mountain</p>
            <p class="price">₱480,000</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>

        <div class="product-card">
            <img src="images/Earth.png" alt="Earth">
            <p>Earth</p>
            <p class="price">₱60,000,000</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>
    </div>


</body>
</html>
